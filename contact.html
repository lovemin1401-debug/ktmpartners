<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>문의하기 | KTM Partners</title>

<meta name="description"
content="제품 상담, 프로젝트 문의, 측정 서비스 및 산업용 3D 솔루션 상담은 KTM Partners로 문의해 주세요.">

<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="header"></div>
<header class="hero-banner contact-hero">
<h1>문의하기</h1>
<p>
제품 및 기술 관련 문의를 남겨주세요.
</p>
</header>
<section>

<h1>문의하기</h1>

<p>
제품 구매, 장비 대여, 측정 서비스 및 기술 상담이 필요하시면 아래 연락처로 문의해 주세요.
</p>

<div class="info-box">
<p><strong>주소</strong> : 부산광역시 북구 덕천로281번길 53, 3층</p>
<p><strong>TEL</strong> : 051-710-8515</p>
<p><strong>E-mail</strong> : info@ktmpartners.co.kr</p>
</div>

<div class="category">
<h2>온라인 문의</h2>

<form action="https://formspree.io/f/mvzjkwdb" method="POST">
<p class="contact-guide">
프로젝트의 목적, 적용 분야 또는 현재 검토 중인 내용을 함께 작성해 주시면
보다 정확한 상담을 도와드릴 수 있습니다.
</p>
<p>
<label>문의 유형 (Inquiry Type) *</label><br>

<select name="inquiry" class="form-input" required>

<option value="">선택해 주세요.</option>

<option>제품 문의 (Product Inquiry)</option>

<option>견적 요청 (Quotation Request)</option>

<option>기술 상담 (Technical Consultation)</option>

<option>측정 서비스 (Measurement Service)</option>

<option>데모 요청 (Demo Request)</option>

<option>기타 (Others)</option>

</select>
</p>

<p>
<label>프로젝트 분야 (Project Industry)</label><br>

<select name="industry" class="form-input">

<option value="">선택해 주세요.</option>

<option>건설 및 플랜트 (Construction & Plant)</option>

<option>제조 및 품질관리 (Manufacturing & Quality Control)</option>

<option>역설계 및 제품개발 (Reverse Engineering & Product Development)</option>

<option>기타 (Others)</option>

</select>

</p>
<p>
<label>관심 솔루션 (Interested Solution)</label><br>

<select name="solution" class="form-input">

<option value="">선택해 주세요.</option>

<option>Digital Reality</option>

<option>3D Metrology</option>

<option>Software</option>

<option>측정 서비스 (Measurement Service)</option>

<option>아직 잘 모르겠습니다. (Not Sure Yet)</option>

</select>

</p>
<p>
<label>회사명 (Company)</label><br>

<input
type="text"
name="company"
class="form-input"
placeholder="회사명을 입력해 주세요.">

</p>

<p>
<label>담당자명 (Contact Name) *</label><br>

<input
type="text"
name="name"
class="form-input"
placeholder="담당자명을 입력해 주세요."
required>

</p>

<p>
<label>이메일 (Email) *</label><br>

<input
type="email"
name="email"
class="form-input"
placeholder="example@email.com"
required>

</p>

<p>
<label>연락처 (Phone)</label><br>

<input
type="tel"
name="phone"
class="form-input"
placeholder="+82 10-0000-0000">

</p>

<p>
<label>문의 제목 (Subject) *</label><br>

<input
type="text"
name="title"
class="form-input"
placeholder="문의 제목을 입력해 주세요."
required>

</p>

<p>
<label>문의 내용 (Message) *</label><br>

<textarea
name="message"
class="form-textarea"
placeholder="문의하실 내용을 입력해 주세요."
required></textarea>

</p>

<button type="submit" class="button">
상담 요청하기
</button>

</form>
</div>

</section>
<div id="footer"></div>

<script src="script.js"></script>

</body>
</html>
